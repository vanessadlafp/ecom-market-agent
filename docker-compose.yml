version: "3.9"
services:
  agent:
    build: .
    container_name: market-agent
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      API_RELOAD: "false"
    volumes:
      - ./data/documents:/app/data/documents:ro
      - ./data/samples:/app/data/samples:ro
      - ./data/cache:/app/data/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  # redis:            # uncomment when upgrading cache
  #   image: redis:7-alpine
  #   ports: ["6379:6379"]
